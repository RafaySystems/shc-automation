[pytest]

# ── Test discovery ────────────────────────────────────────────────────────────
testpaths = tests

# ── Default options ───────────────────────────────────────────────────────────
addopts =
    --html=reports/report.html
    --self-contained-html
    --tb=short
    -v

# ── HTML report metadata ──────────────────────────────────────────────────────
# Metadata values added dynamically in conftest.py

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    order: test execution order (pytest-order plugin)
    controller: controller bringup and validation tests
    console: console login and org/user tests
    upgrade: controller upgrade tests
    regression: full regression suite
    smoke: quick smoke tests

# ── Logging ───────────────────────────────────────────────────────────────────
log_cli        = true
log_cli_level  = INFO
log_format     = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %H:%M:%S